name: Cleanup Expired Orders

on:
  schedule:
    # Ejecutar cada 6 horas en lugar de cada hora (menos probabilidad de fallas)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Evita que quede colgado 15+ minutos
    
    steps:
      - name: Call cleanup endpoint
        run: |
          curl -X POST https://ecommerce-api-production-50fd.up.railway.app/api/order/cleanup-expired \
            -H "X-Cleanup-Key: ${{ secrets.CLEANUP_API_KEY }}" \
            -H "Content-Type: application/json" \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            -f
